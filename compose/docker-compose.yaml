services:
  monkeytype-stats-env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    environment:
      Dashboard__Frontend__BrowserToken: "${MONKEYTYPE_STATS_ENV_DASHBOARD_BROWSER_TOKEN}"
    ports:
      - "${MONKEYTYPE_STATS_ENV_DASHBOARD_PORT}:18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "monkeytype-stats-backend"
    restart: "unless-stopped"
  postgres:
    image: "docker.io/library/postgres:17.6"
    environment:
      PUID: ${APPUSER_PUID}
      PGID: ${APPUSER_PGID}
      TZ: ${TIME_ZONE_VALUE}
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - ${PATH_TO_APPDATA}/monkeytype-stats/postgres:/var/lib/postgresql/data
    networks:
      - "monkeytype-stats-backend"
    restart: "unless-stopped"
  monkeytype-stats-api:
    image: "ghcr.io/kovacsgellert/monkeytype-stats/monkeytype-stats-api:0.2.0"
    environment:
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "8080"
      ConnectionStrings__monkeytype-stats-db: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=monkeytype-stats-db"
      MonkeyTypeApi__BaseUrl: "https://api.monkeytype.com"
      MonkeyTypeApi__ApeKey: "${MONKEYTYPE_APE_KEY}"
      MonkeyTypeStatsApiKey: "${MONKEYTYPE_STATS_API_KEY}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://monkeytype-stats-env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "monkeytype-stats-api"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "true"
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: "service_started"
    networks:
      - "monkeytype-stats-backend"
    restart: "unless-stopped"
  monkeytype-stats-frontend:
    image: "ghcr.io/kovacsgellert/monkeytype-stats/monkeytype-stats-frontend:0.2.0"
    environment:
      NODE_ENV: "production"
      MONKEYTYPE_STATS_FRONTEND_PORT: "3000"
      MONKEYTYPE_STATS_API_HTTP: "http://monkeytype-stats-api:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://monkeytype-stats-env-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "monkeytype-stats-frontend"
    ports:
      - "${MONKEYTYPE_STATS_FRONTEND_PORT}:3000"
    networks:
      - "monkeytype-stats-backend"
    #      - "traefik_frontend"
    restart: "unless-stopped"
#    labels:
#      - traefik.enable=true
#      - traefik.http.routers.monkeytype-stats-frontend-https.rule=Host(`your-domain.com`)
#      - traefik.http.routers.monkeytype-stats-frontend-https.entrypoints=websecure
#      - traefik.http.routers.monkeytype-stats-frontend-https.tls=true
#      - traefik.http.routers.monkeytype-stats-frontend-https.tls.certresolver=cloudflare
#      - traefik.http.services.monkeytype-stats-https.loadbalancer.server.port=3000
#      - traefik.docker.network=traefik_frontend
networks:
  monkeytype-stats-backend:
    driver: "bridge"
#  traefik_frontend:
#    external: true
