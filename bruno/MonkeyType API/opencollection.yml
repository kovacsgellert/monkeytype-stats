opencollection: 1.0.0

info:
  name: MonkeyType API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: apikey
    key: Authorization
    value: ApeKey {{ApeKey}}
    placement: header
bundled: false
extensions:
  ignore:
    - node_modules
    - .git
